# ============================================================
# docker-compose.yml — Federated Transformer for 6G-ISAC
# ============================================================
# Usage:
#   docker compose up -d --build          # start all services
#   docker compose up --build trainer     # training only
#   docker compose up --build dashboard   # dashboard only
#   docker compose logs -f trainer        # follow training logs
#   docker compose down                   # stop & remove containers
# ============================================================

services:

  # ── Federated training simulation ─────────────────────────
  trainer:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: fedtransformer_trainer
    command: python main.py --clients 5 --rounds 10 --clients_per_round 3
    volumes:
      # Persist model checkpoints and plots to host
      - ./outputs:/app/outputs
      # Persist CSV metric logs to host
      - ./logs:/app/logs
    environment:
      - PYTHONUNBUFFERED=1
      - MPLBACKEND=Agg
    restart: on-failure

  # ── Streamlit dashboard ────────────────────────────────────
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: fedtransformer_dashboard
    command: >
      streamlit run frontend/dashboard.py
      --server.address 0.0.0.0
      --server.port 8501
      --server.headless true
    ports:
      - "8501:8501"
    volumes:
      # Read the same logs/outputs the trainer writes
      - ./outputs:/app/outputs
      - ./logs:/app/logs
    environment:
      - PYTHONUNBUFFERED=1
    depends_on:
      - trainer
    restart: unless-stopped
